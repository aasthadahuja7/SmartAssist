
services:
  # 1. The Database Service (MySQL)
  mysql-db:
    image: mysql:8.0
    container_name: smartassist-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: smartassist_db
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql

  # 2. The Backend Service (Node.js/Express)
  backend:
    build: ./server
    container_name: smartassist-backend
    ports:
      - "5001:5001"
    environment:
      - GEMINI_API_KEY=AIzaSyDtGv1c2pRnDQrQXo4ZzgaKjFpMTA1zIvI
      - JWT_SECRET=superSecretAasthaKey123!
      - PORT=5001
      - DB_HOST=mysql-db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpassword123
      - DB_NAME=smartassist_db
    depends_on:
      - mysql-db

  # 3. The Frontend Service (Now renamed to smart-assist!)
  smart-assist:
    build: ./smart-assist-web
    container_name: smartassist-web
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db-data: